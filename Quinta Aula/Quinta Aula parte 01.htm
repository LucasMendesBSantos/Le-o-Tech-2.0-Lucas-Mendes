<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinta aula parte 01</title>
    <link rel="stylesheet" href="Quinta aula css parte01.css">
</head>
<body>

<!-- Elementos do tipo Block -->
 <!-- Consegue Controlar o Margin, Padding, position -->

    <h1 id="Titulo01">Aula 05</h1>

    <h1 id="Titulo02">Modelo de caixa</h1>

    <h1 class="Azul">1</h1>
    <h1 class="Vermelho">2</h1>
    <h1 class="Amarelo">3</h1>
    <h1 class="Verde">4</h1>


    <div></div>
    <header></header>
    <main></main>
    <section></section>
    <article></article>
    <footer></footer>
    <ul></ul>
    <li></li>
    <table></table>
    <tr></tr>


    <!-- Elementos inline -->
     <!-- Elementos do tipo inline não da pra Controlar largura e nem altura -->
      <!-- Como ele está in line, as classes com azul vão ficar com magem em cima e em baixo, mas no spam, só vai ficar com margem na esquerda ou direita -->
    <span class="Azul">Span1</span>
    <span class="Vermelho">Span2</span>
    <span class="Amarelo">Span3</span>
    <span class="Verde">Span4</span>

    <a href=""></a>
    <strong></strong>
    <b></b>
    <i></i>
    <label for=""></label>



    <!-- Elementos que são inline-block -->
     <!-- Quando vc quer a caracteristica boa dos dois lados -->
      <!-- Consegue colocar um do lado do outro e ainda consegue controlar a altura e largura-->
       <img class="imagem1 Azul" src="../Segunda aula/imagem Absolute Cinema.jpg" alt="">
<!-- Quando se coloca mais de uma classe, a ultima tem priodidade, para coocar mais de uma, só dar espaçi e coloca no mesmo paragrafo -->
        <img class="imagem2 Vermelho" src="../Segunda aula/imagem Absolute Cinema.jpg" alt="">

         <img class="imagem3 Amarelo" src="../Segunda aula/imagem Absolute Cinema.jpg" alt="">

          <img class="imagem4 Verde" src="../Segunda aula/imagem Absolute Cinema.jpg" alt="">

       <br><br>

    <h1 class="h1">1</h1>
    <h1 class="h2">2</h1>
    <h1 class="h3">3</h1>
    <h1 class="h4">4</h1>




</body>
</html>
