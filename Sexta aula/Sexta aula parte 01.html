<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta Aula Parte 01</title>
</head>

<style>
.Container{
    border: 2px solid black;
    padding: 10px;
    display: flex;
    height: 500px;
    flex-direction:row;
    /* Colum, row e as opções també no reverse */
    flex-wrap: wrap;
    /* wrap, nowrap e wrap-reverse */
    justify-content: space-evenly; /*Alinhamento de elementos como se fosse texto*/
/* o between encosta os elementos nas bordas */
/* o around da um espaço dos elementos nas bordas */
/* o evenly deixa o mesmo espaçamento dos elementos nas bordas */

align-content: start; /* ajustar o alinhamento*/

align-items: center; /* para a surpresa de 0 pessoas, alinha os itens*/


    

    /*  da pra coloca a div aqui dentro e todas as classes ou tags que estão ai dentro seria alterado */

}
/* Div div é a aplicação da div que está dentro de outra div. */
div div{   

    margin: 5px;

}

.div1{
    background-color: red;
    width: 100px;
    height: 100px;

}

.div2{
    background-color: blue;
    width: 100px;
    height: 100px;
}

.div3{
    background-color: blueviolet;
    width: 100px;
    height: 100px;
}

.div4{
    background-color: burlywood;
    width: 100px;
    height: 100px;
}

.div5{
    background-color: olive;
    width: 100px;
    height: 100px;
}

.div6{
    background-color: lawngreen;
    width: 100px;
    height: 100px;
}

.div7{
    background-color: orangered;
    width: 100px;
    height: 100px;
}

</style>

<body>
    
<h1>Display Flex</h1>


<Div class="Container">

    <div class="div1">div1</div>

    <div class="div2">div2</div>

    <div class="div3">div3</div>

    <div class="div4">div4</div>

    <div class="div5">div5</div>

    <div class="div6">div6</div>

    <div class="div7">div7</div>

</Div>

</body>
</html>
